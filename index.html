      /* ==========================================================
   Featured Projects
========================================================== */

.featured-work-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 2rem;
  margin-top: 4rem;
}

.featured-project-card {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--color-neutral-900);
  border: 1px solid var(--color-neutral-800);
  border-radius: 1.25rem;
  transition: .3s ease;
}

.featured-project-card:hover {
  transform: translateY(-6px);
  border-color: var(--color-brand-400);
}

/* ==========================================================
   Image
========================================================== */

.featured-project-card__image-link {
  display: block;
  overflow: hidden;
  cursor: pointer;
  border: 0;
  background: none;
  padding: 0;
}

.featured-project-card__image {
  display: block;
  width: 100%;
  aspect-ratio: 16 / 9;
  object-fit: cover;
  transition: transform .5s ease;
}

.featured-project-card:hover .featured-project-card__image {
  transform: scale(1.04);
}

/* ==========================================================
   Body
========================================================== */

.featured-project-card__content {
  display: flex;
  flex-direction: column;
  gap: 1.25rem;
  padding: 2rem;
}

.featured-project-card__eyebrow {
  margin: 0;
  color: var(--color-brand-400);
  font-size: .75rem;
  font-weight: 700;
  letter-spacing: .15em;
  text-transform: uppercase;
}

.featured-project-card__title {
  margin: 0;
  font-family: var(--font-heading);
  font-size: 2rem;
  line-height: 1.1;
}

.featured-project-card__title button {
  padding: 0;
  color: inherit;
  font: inherit;
  cursor: pointer;
  background: none;
  border: 0;
}

.featured-project-card__meta {
  margin: -.75rem 0 0;
  color: var(--color-neutral-400);
  font-size: .9rem;
}

.featured-project-card__description {
  margin: 0;
  color: var(--color-neutral-300);
  line-height: 1.8;
}

/* ==========================================================
   Metrics
========================================================== */

.featured-project-card__metrics {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 1rem;
  margin: .5rem 0;
}

.featured-project-card__metric {
  padding: 1.25rem;
  text-align: center;
  background: rgba(255,255,255,.03);
  border: 1px solid var(--color-neutral-800);
  border-radius: .9rem;
}

.featured-project-card__metric dt {
  margin-bottom: .4rem;
  color: var(--color-neutral-500);
  font-size: .75rem;
  text-transform: uppercase;
  letter-spacing: .08em;
}

.featured-project-card__metric dd {
  margin: 0;
  color: var(--color-brand-400);
  font-size: 2rem;
  font-weight: 700;
}

/* ==========================================================
   Footer
========================================================== */

.featured-project-card__footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 1.5rem;
  padding-top: 1.5rem;
  margin-top: auto;
  border-top: 1px solid var(--color-neutral-800);
}

/* ==========================================================
   Tech Stack
========================================================== */

.featured-project-card__technologies {
  display: flex;
  flex-wrap: wrap;
  gap: .5rem;
  margin: 0;
  padding: 0;
  list-style: none;
}

.featured-project-card__technologies li {
  padding: .45rem .85rem;
  color: var(--color-neutral-300);
  font-size: .8rem;
  background: rgba(255,255,255,.04);
  border: 1px solid var(--color-neutral-700);
  border-radius: 999px;
}

/* ==========================================================
   CTA
========================================================== */

.featured-project-card__cta {
  display: inline-flex;
  align-items: center;
  gap: .5rem;
  padding: 0;
  color: var(--color-brand-400);
  font-weight: 700;
  cursor: pointer;
  background: none;
  border: 0;
  transition: gap .2s ease;
}

.featured-project-card__cta:hover {
  gap: .9rem;
}

/* ==========================================================
   Mobile
========================================================== */

@media (max-width: 992px) {

  .featured-work-grid {
    grid-template-columns: 1fr;
  }

}

@media (max-width: 768px) {

  .featured-project-card__content {
    padding: 1.5rem;
  }

  .featured-project-card__title {
    font-size: 1.65rem;
  }

  .featured-project-card__metrics {
    grid-template-columns: 1fr;
  }

  .featured-project-card__footer {
    flex-direction: column;
    align-items: flex-start;
  }

}
